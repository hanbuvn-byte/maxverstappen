<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hanbu Car AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="loginScreen" class="center">
    <div class="card">
        <h1>Hanbu Car AI</h1>

        <input id="username" placeholder="Username">
        <input id="password" type="password" placeholder="Password">

        <button onclick="login()">Login</button>

        <p id="loginError"></p>
    </div>
</div>

<div id="chatScreen" style="display:none;">
    <header>
        <h2>🚗 Hanbu Car AI</h2>
        <button onclick="logout()">Logout</button>
    </header>

    <div id="chatBox">
        <div class="bot">
            Yo! I'm a car guy AI. Ask me anything about JDM, hypercars,
            racing, tuning, engines, track setups, or performance builds.
        </div>
    </div>

    <div id="inputArea">
        <input id="messageInput" placeholder="Ask about cars...">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
